<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06060f"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="salsa" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e63946"/>
      <stop offset="100%" style="stop-color:#f4a261"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e63946"/>
      <stop offset="40%" style="stop-color:#f4a261"/>
      <stop offset="100%" style="stop-color:#c77dff"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="180" cy="63" r="200" fill="rgba(230,57,70,0.08)"/>
  <circle cx="1020" cy="567" r="200" fill="rgba(123,47,255,0.08)"/>
  
  <!-- Title -->
  <text x="600" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="url(#title)">Próximas Clases</text>
  
  <!-- Subtitle -->
  <text x="600" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="300" fill="#7777a0">Salsa &amp; Bachata</text>
  
  <!-- Decorative line -->
  <rect x="450" y="360" width="300" height="2" fill="url(#salsa)" rx="1"/>
  
  <!-- Description -->
  <text x="600" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#eeeef8">Cuenta regresiva en tiempo real</text>
  
  <!-- Footer -->
  <text x="600" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7777a0">academia de baile</text>
</svg>